name: Net Monitor — CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  APP_IMAGE:   ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-app
  NGINX_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-nginx

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Push imágenes a Docker Hub
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: "CI — Build & Push"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen — netmonitor-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build imagen NGINX
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:latest
            ${{ env.NGINX_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Pruebas de infraestructura (★ Evaluadas)
  # ────────────────────────────────────────────────────────────────
  infra-tests:
    name: "★ Pruebas de Infraestructura"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "★ Health Check HTTP — /nginx-health endpoint"
        run: |
          echo "=========================================="
          echo " PRUEBA 1: Health Check HTTP"
          echo " Target : http://${{ secrets.EC2_PUBLIC_IP }}/nginx-health"
          echo "=========================================="
          for attempt in 1 2 3 4 5; do
            echo "Intento $attempt/5..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              http://${{ secrets.EC2_PUBLIC_IP }}/nginx-health)
            echo "Código HTTP recibido: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check PASADO — HTTP 200 OK"
              exit 0
            fi
            echo "⏳ No disponible aún, esperando 10s..."
            sleep 10
          done
          echo "❌ Health check FALLIDO"
          exit 1

      - name: "★ Prueba de Latencia — tiempo de respuesta HTTP"
        run: |
          echo "=========================================="
          echo " PRUEBA 2: Latencia de red"
          echo " Target : http://${{ secrets.EC2_PUBLIC_IP }}/"
          echo "=========================================="
          LATENCIA=$(curl -s -o /dev/null -w "%{time_total}" --max-time 15 http://${{ secrets.EC2_PUBLIC_IP }}/)
          echo "Tiempo de respuesta total: ${LATENCIA}s"
          LATENCIA_MS=$(echo "$LATENCIA * 1000" | bc | cut -d'.' -f1)
          echo "Latencia en ms: ${LATENCIA_MS}ms"
          if [ "$LATENCIA_MS" -lt 5000 ]; then
            echo "✅ Latencia ACEPTABLE"
          else
            echo "⚠️  Latencia ALTA"
          fi

      - name: "★ Validación de Puerto 80 accesible"
        run: |
          echo "=========================================="
          echo " PRUEBA 3: Validación de puerto abierto"
          echo " Target : ${{ secrets.EC2_PUBLIC_IP }}:80"
          echo "=========================================="
          if timeout 10 bash -c "echo > /dev/tcp/${{ secrets.EC2_PUBLIC_IP }}/80" 2>/dev/null; then
            echo "✅ Puerto 80 ABIERTO y accesible"
          else
            echo "❌ Puerto 80 NO accesible"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy a AWS ECS (CD)
  # ────────────────────────────────────────────────────────────────
  deploy-ecs:
    name: "CD — Deploy a AWS ECS"
    runs-on: ubuntu-latest
    needs: infra-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: "Deploy — forzar nuevo despliegue netmonitor-unified-svc"
        run: |
          echo "Iniciando deploy del service unificado..."
          aws ecs update-service \
            --cluster  ${{ secrets.ECS_CLUSTER }} \
            --service  netmonitor-unified-svc \
            --force-new-deployment \
            --query "service.{status:status, deployments:length(deployments)}" \
            --output table
          echo "✅ Deploy unificado iniciado en ECS"

      - name: "Verificar estabilidad del cluster ECS"
        run: |
          echo "Esperando que el servicio alcance estado estable..."
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services netmonitor-unified-svc
          echo "✅ Servicio ECS estable y corriendo"